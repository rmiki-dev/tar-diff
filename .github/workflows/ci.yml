name: Continuous Integration
on: 
  push:
    branches:
     - main
  pull_request:

jobs:
  test-job:
  # CI Validation: Temporary job to verify GitHub Action triggers.
    runs-on: ubuntu-latest
    steps:
      - name: Successful test
        run: echo "The job was automatically triggered by a ${{ github.event_name }} event."

  test-makefile:
    name: build and test makefile
    runs-on: ubuntu-latest
    env:
      COMMIT_RANGE: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Fetch base branch (for commit range in PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} || \
          (git remote add upstream ${{ github.event.pull_request.base.repo.clone_url }} && git fetch upstream ${{ github.event.pull_request.base.ref }})
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make tar diffutils bzip2 gzip curl git
      - name: run make
        run: make

  test-fedora:
    name: build and test on Fedora latest
    runs-on: ubuntu-latest
    env:
      COMMIT_RANGE: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }}
    container:
      image: quay.io/fedora/fedora:latest
      options: --user root
    steps:
      - name: Install dependencies
        run: |
          dnf update -y
          dnf install -y golang make tar diffutils bzip2 gzip curl git which
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Fetch base branch (for commit range in PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} || \
          (git remote add upstream ${{ github.event.pull_request.base.repo.clone_url }} && git fetch upstream ${{ github.event.pull_request.base.ref }})
      - name: Build and test
        run: make
