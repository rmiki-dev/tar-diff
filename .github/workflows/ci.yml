name: Continuous Integration
on: 
  push:
    branches:
      - main
      - multi-platform
  pull_request:

jobs:

  test-makefile:
    name: build and test makefile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make tar diffutils bzip2 gzip curl git
      - name: run make
        run: make

  test-fedora:
    name: build and test on Fedora latest
    runs-on: ubuntu-latest
    container:
      image: quay.io/fedora/fedora:latest
      options: --user root
    steps:
      - name: Install dependencies
        run: |
          dnf update -y
          dnf install -y golang make tar diffutils bzip2 gzip curl git which
      - name: Mark repo as safe for git
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Build and test
        run: make
 
  version-release:
    runs-on: ubuntu-latest
    needs: [test-makefile, test-fedora]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Github app installation token
        id: create_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.RELEASE_APP_ID }}
          private_key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ steps.create_token.outputs.token }}

  test-macOS:
     name: Build and test on macOS
     runs-on: macos-latest
     steps:
       - name: check out repository
         uses: actions/checkout@v6
       - name: Install dependencies
         run: |
           brew update
           brew install golang make diffutils git grep gnu-tar
       - name: Build and test
         run: make


  test-windows:
    name: Build and test on Windows
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          choco install -y golang make diffutils gzip bzip2 git 
      - name: Build and test
        run: bash -c "make"

